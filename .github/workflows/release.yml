name: Release DUET
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-22.04'
            args: '--target aarch64-linux-android'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'ubuntu-22.04' && 'aarch64-linux-android' || '' }}

      - name: Setup Java
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        if: matrix.platform == 'ubuntu-22.04'
        uses: android-actions/setup-android@v3

      # --- NEW: Fixes the 'aarch64-linux-android-clang++' error ---
      - name: Set NDK Path
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk-bundle" >> $GITHUB_ENV
          echo "NDK_HOME=${ANDROID_SDK_ROOT}/ndk-bundle" >> $GITHUB_ENV

      - name: Install Dependencies
        run: npm install

      - name: Initialize Android (if missing)
        if: matrix.platform == 'ubuntu-22.04'
        run: npx tauri android init
        continue-on-error: true 

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DUET v__VERSION__'
          releaseBody: 'Automated release for Windows and Android.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
